<!doctype html>
<html>
    <head>
        <title>Login</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body data-bs-theme="dark">
        <div class="container">
            <div class="row my-5">
                <div class="col-lg-6 mx-auto text-center">
                    <h5 class="fs-4 mb-3">Login</h5>

                    <form name="" action="">
                        <div class="input-group mb-3">
                            <span class="input-group-text">Email</span>

                            <input type="email" name="email" class="form-control" placeholder="Inserisci email..." required>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">Password</span>
                            
                            <input type="password" name="password" id="psw" class="form-control" placeholder="Inserisci password..." required>
                            
                            <button type="button" class="btn btn-secondary" onclick="togglePassword()">👁️‍🗨️</button>
                        </div>
                        
                        <button type="submit" class="btn btn-outline-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function togglePassword() {
                const password = document.getElementById("psw");

                password.type = password.type === "password" ? "text" : "password";
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
<html>
