<!DOCTYPE html>
<html>
    <head>
        <title>Images</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body>
        <div class="col-md p-3">
            <a href="index.html" class="btn btn-danger">Back to menu</a>
        </div>

        <div class="container bg-secondary-subtle rounded-3 border border-5 border-dark-subtle my-3">
            <h5 class="fs-2 text-center">Images</h5>

            <h5 class="fs-4 text-center">Responsive</h5>
            
            <img src="foto/poster.png" class="img-fluid">

            <hr>

            <h5 class="fs-4 text-center">Thumbnail</h5>

            <img src="foto/poster.png" class="img-thumbnail">

            <hr>

            <h5 class="fs-4 text-center">Aligning</h5>

            <img src="foto/poster.png" class="rounded mx-auto d-block">

            <br><br>

            <div class="text-center">
                <img src="foto/poster.png" class="rounded">
            </div>

            <hr>

            <h5 class="fs-4 text-center">Rounded</h5>

            <img src="foto/poster.png" class="rounded-1">
            <img src="foto/poster.png" class="rounded-2">
            <img src="foto/poster.png" class="rounded-3">
            <img src="foto/poster.png" class="rounded-4">
            <img src="foto/poster.png" class="rounded-5">
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
