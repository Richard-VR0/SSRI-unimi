<!DOCTYPE html>
<html>
    <head>
        <title id="tab-title"></title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <script src="lib.js"></script>

        <script>
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            var lang = params.get('lang');
        </script>
    </head>

    <body onload="caricaDettagliAttore(); caricaLingue(lang);">
        <div class="p-0 container-fluid">
            <!-- navbar -->
            <nav class="navbar bg-primary navbar-expand-md sticky-top" data-bs-theme="dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="popolari.html">PezzottoDB</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="popolari.html" class="nav-link active" aria-current="page">Popolari</a>
                            </li>

                            <li class="nav-item">
                                <select id="lang" class="form-select" aria-label="Default select example" onchange="cambiaLang('attore');">
                                </select>
                            </li>  
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- scheda attore -->
            <div class="container-fluid mb-4 p-0 rounded-0">
                <div class="card my-4 bg-secondary border-0 text-white">
                    <div class="row g-0">
                        <div class="col-lg-4">
                            <img src="https://media.themoviedb.org/t/p/w220_and_h330_face" id="poster" class="d-block mx-auto my-3 rounded-3 shadow-lg">
                        </div>

                        <div class="col-lg-7">
                            <div class="card-body">
                                <h5 id="nome" class="card-title fs-2 fw-bold"></h5>

                                <span id="data-di-nascita" class="card-text fs-5 fw-light"></span>
                                <span id="data-di-morte" class="card-text fs-5 fw-light"></span>

                                <br>

                                <span class="card-text fs-5 fw-semibold">Luogo di nascita: </span>
                                <span id="luogo-di-nascita" class="card-text fw-light"></span>

                                <p id="tagline" class="card-text fst-italic text-white-50 my-3"></p>

                                <span class="card-text fs-5 fw-semibold">Popolarità:</span>
                                <span id="popolarita" class="card-text fw-light"></span>

                                <div class="my-4">
                                    <p class="card-text">
                                        <span class="fs-5 fw-semibold">Biografia</span>

                                        <br>

                                        <span id="biografia" class="fw-light"></span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- cast - info -->
            <div class="container-xl border-0">
                <h5 class="fs-4">Film</h5>

                <div id="container-film" class="row g-3">
                    <div id="film" class="col-auto mx-auto d-none">
                        <div class="card h-100" style="width: 10rem;">
                            <a href="scheda_film.html">
                                <img src="https://media.themoviedb.org/t/p/w220_and_h330_face" class="card-img-top" alt="">
                            </a>
                            <div class="card-body">
                                <a href="scheda_film.html" class="link-dark link-offset-2 link-underline link-underline-opacity-0 link-underline-opacity-100-hover"><p class="card-text"></p></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
