<!DOCTYPE html>
<html>
    <head>
        <title id="tab-title"></title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <script src="lib.js"></script>

        <script>
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            var lang = params.get('lang');
        </script>
    </head>

    <body onload="caricaDettagliFilm(); caricaLingue(lang);">
        <div class="p-0 container-fluid">
            <!-- navbar -->
            <nav class="navbar bg-primary navbar-expand-md sticky-top" data-bs-theme="dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="popolari.html">PezzottoDB</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="popolari.html" class="nav-link active" aria-current="page">Popolari</a>
                            </li>

                            <li class="nav-item">
                                <select id="lang" class="form-select" aria-label="Default select example" onchange="cambiaLang('film');">
                                </select>
                            </li>  
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- scheda film -->
            <div class="container-fluid mb-4 p-0 rounded-0">
                <div class="card border-0 rounded-0 overflow-hidden position-relative bg-secondary-subtle">
                    <img src="" id="back" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover">

                    <div class="position-absolute top-0 start-0 w-100 h-100 opacity-75 bg-success bg-gradient"></div>

                    <div class="card my-4 bg-transparent border-0 text-white">
                        <div class="row g-0">
                            <div class="col-lg-4">
                                <img src="" id="poster" class="d-block mx-auto my-3 rounded-3 shadow-lg">
                            </div>

                            <div class="col-lg-7">
                                <div class="card-body">
                                    <h5 id="titolo" class="card-title fs-2 fw-bold"></h5>

                                    <span class="card-text">
                                        <small id="data-di-rilascio" class="fw-light"></small>
                                    </span>

                                    <span id="container-genere" class="card-text">
                                        <small id="genere" class="d-none fw-light"></small>
                                    </span>

                                    <p id="tagline" class="card-text fst-italic text-white-50 my-3"></p>
                                    
                                    <div class="row">
                                        <span class="card-text fs-5 fw-semibold">Punteggio utente</span>
                                        <div class="col-3">
                                            <div id="vote-bar" class="progress mt-3" role="progressbar" aria-label="Basic example" aria-valuenow="56" aria-valuemin="0" aria-valuemax="100">
                                                <div id="vote_average" class="progress-bar" style="width: 0%;"></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="my-4">
                                        <p class="card-text">
                                            <span class="fs-5 fw-semibold">Descrizione</span>

                                            <br>

                                            <span id="descrizione" class="fw-light"></span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- cast - info -->
            <div class="container-xl border-0">
                <div class="row">
                    <!-- cast -->
                    <div class="col-lg-9">
                        <h5 class="fs-4">Cast</h5>

                        <div id="container-attore" class="row g-3">
                            <div id="attore" class="col-auto mx-auto d-none">
                                <div class="card h-100" style="width: 10rem;">
                                    <a href="scheda_attore.html">
                                        <img src="https://media.themoviedb.org/t/p/w220_and_h330_face" class="card-img-top" alt="">
                                    </a> 
                                    <div class="card-body">
                                        <a href="scheda_attore.html" class="link-dark link-offset-2 link-underline link-underline-opacity-0 link-underline-opacity-100-hover"><p class="card-text"></p></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>

                    <!-- info -->
                    <div class="col-lg-3">
                        <h5 class="fs-4">Informazioni</h5>

                        <div class="my-3">
                            <h5 class="fs-6 fw-bold my-0">Titolo originale</h5>
                            <span id="titolo-originale"></span>
                        </div>
                        
                        <div class="my-3">
                            <h5 class="fs-6 fw-bold my-0">Lingua originale</h5>
                            <span id="lingua-originale"></span>
                        </div>

                        <div class="my-3">
                            <h5 class="fs-6 fw-bold my-0">Budget</h5>
                            <span id="budget"></span>
                        </div>

                        <div class="my-3">
                            <h5 class="fs-6 fw-bold my-0">Incasso</h5>
                            <span id="revenue"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
