<!DOCTYPE html>
<html>
    <head>
        <title>PezzottoDB</title>
        
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

        <script src="lib.js"></script>
    </head>

    <body onload="mostraPopolari(); caricaLingue('en');">
        <!-- navbar -->
        <nav class="navbar bg-primary navbar-expand-md sticky-top" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="popolari.html">PezzottoDB</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="popolari.html">Popolari</a>
                        </li>                  
                    </ul>
                </div>
            </div>
        </nav>

        <!-- container -->
        <div class="container">
            <div class="row g-3 my-3">
                <div class="col-lg-3">
                    <input type="text" id="ricerca" class="form-control" placeholder="Cerca..." onkeyup="ricerca()">
                </div>
                
                <div class="col-lg-2">
                    <label class="form-check-label" for="checkDefault">
                        Film per adulti?
                    </label>
                    <input class="form-check-input" type="checkbox" value="" id="adulti" onchange="ricerca()">
                </div>

                <div class="col-lg-2">
                    <select id="lang" class="form-select" aria-label="Default select example" onchange="ricerca()"></select>
                </div>
            </div>

            <nav aria-label="...">
                <ul class="pagination">
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="precedentePagina()">Precedente</a>
                    </li>

                    <li class="page-item active" id="tprecedente">
                        <a id="pprecedente" onclick="precedentePagina()" class="page-link" href="#">1</a>
                    </li>
                    
                    <li class="page-item" aria-current="page" id="tcentrale">
                        <span id="pcentrale" class="page-link">2</span>
                    </li>
                    
                    <li id="tsuccessiva" class="page-item">
                        <a id="psuccessiva" onclick="prossimaPagina()" class="page-link" href="#">3</a>
                    </li>
                    
                    <li class="page-item">
                        <a  class="page-link" href="#" onclick="prossimaPagina()">Successivo</a>
                    </li>
                </ul>
            </nav>

            <!-- popolari -->
            <h1 class="fs-2 my-4"></h1>

            <div id="container-popolare" class="row g-3 mb-4">
                <div id="popolare" class="col d-none">
                    <div class="card mx-auto h-100" style="width: 13rem;">
                        <a href="scheda_film.html">
                            <img src="https://media.themoviedb.org/t/p/w220_and_h330_face" class="card-img-top">
                        </a>
                        
                        <div class="card-body">
                            <a href="scheda_film.html" class="link-dark link-offset-2 link-underline link-underline-opacity-0 link-underline-opacity-100-hover">
                                <h5 class="card-title fs-6"></h5>
                            </a>
                            <small id="data-di-rilascio" class="card-text"></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script>
            var contatore = 1
            var psuccessiva = document.getElementById('psuccessiva');
            var pcentrale = document.getElementById('pcentrale');
            var pprecedente = document.getElementById('pprecedente');
        </script>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
