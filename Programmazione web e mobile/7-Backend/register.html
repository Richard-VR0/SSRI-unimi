<!doctype html>
<html>
    <head>
        <title>Login</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <script src="lib.js"></script>
    </head>

    <body data-bs-theme="dark">
        <div class="container">

            <div class="row my-5">
                <div id="utente" class="col-lg-5 mx-auto p-5 rounded-3 text-center bg-light-subtle">
                    <h5 class="fs-4 mb-3">Utente</h5>

                    <form name="form-utente">
                        <div class="input-group mb-3">
                            <span class="input-group-text">Nome</span>

                            <input type="text" name="nome" class="form-control" required>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">Cognome</span>

                            <input type="text" name="cognome" class="form-control" required>
                        </div>
                        
                        <div class="input-group mb-3">
                            <span class="input-group-text">Email</span>

                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">Password</span>

                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <button type="button" class="btn btn-success" onclick="registra()">Registrati</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
<html>
